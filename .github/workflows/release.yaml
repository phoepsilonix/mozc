name: Release

on:
  create:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - name: install build tools (Linux)
        run: |
          apt-get update
          apt-get install -y sudo apt-utils wget
          sudo sed 's/Types: deb *$/Types: deb deb-src/' -i /etc/apt/sources.list.d/debian.sources
          sudo apt-get update
          sudo apt-get build-dep -y mozc
          sudo apt-get install -y build-essential dpkg-dev make git qt6ct qt6-base-dev libfcitx5-qt6-dev curl unzip
      - name: Install bazel
        run: |
           curl -LO https://github.com/bazelbuild/bazel/releases/download/7.1.0/bazel-7.1.0-installer-linux-x86_64.sh
           bash bazel-7.1.0-installer-linux-x86_64.sh --user
      - name: Install mold linker
        uses: rui314/setup-mold@staging
        with:
          mold-version: 2.30.0
          make-default: true
      - uses: actions/checkout@v4
        with:
          ref: debian
          submodules: 'recursive'
          path: source
      - name: Build
        shell: bash
        run: |
          export PATH=$HOME/bin:$PATH
          source ~/.bazel/bin/bazel-complete.bash
          cd source
          sed "s/^\(LDFLAGS:=.*\)/\1 -fuse-ld=mold/" debian/rules -i
          dpkg-buildpackage -b --no-sign
          cd ..
          mkdir -p release
          mv *deb mozc_* release/
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          omitBody: true
          artifacts: 'release/*'
          token: ${{ secrets.GITHUB_TOKEN }}

