name: CI for Windows
# https://github.com/google/mozc/blob/master/docs/build_mozc_in_windows.md

# Run on push.
on: push

permissions:
  contents: read

# Prevent previous workflows from running.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build_on_x64:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Try to restore update_deps cache
        uses: actions/cache@v6
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Build Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: build artifacts
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build package --config release_build

      - name: upload Mozc64_x64.msi
        uses: actions/upload-artifact@v7
        with:
          name: Mozc64_x64.msi
          path: src/bazel-bin/win32/installer/Mozc64.msi
          if-no-files-found: warn

  build_universal_on_x64:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Try to restore update_deps cache
        uses: actions/cache@v6
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Build Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: build artifacts
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build package --config release_build --config win_universal_installer

      - name: upload Mozc64_universal.msi
        uses: actions/upload-artifact@v7
        with:
          name: Mozc64_universal.msi
          path: src/bazel-bin/win32/installer/Mozc64.msi
          if-no-files-found: warn

  build_on_arm64:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows11-Arm64-Readme.md
    runs-on: windows-11-arm
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Try to restore update_deps cache
        uses: actions/cache@v6
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Build Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: build artifacts
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build package --config release_build

      - name: upload Mozc64_arm64.msi
        uses: actions/upload-artifact@v7
        with:
          name: Mozc64_arm64.msi
          path: src/bazel-bin/win32/installer/Mozc64.msi
          if-no-files-found: warn

  test_on_x64:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Try to restore update_deps cache
        uses: actions/cache@v6
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: runtests
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk test ... -c dbg --build_tests_only --build_event_json_file=bep.jsonl

      - name: Collect failing test logs
        if: failure()
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools\collect_test_logs.py --bep bep.jsonl --out "%GITHUB_WORKSPACE%\test_logs"

      - name: Upload failing test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ runner.os }}-${{ runner.arch }}
          path: test_logs
          if-no-files-found: ignore

  test_on_arm64:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows11-Arm64-Readme.md
    runs-on: windows-11-arm
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Try to restore update_deps cache
        uses: actions/cache@v6
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: runtests
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk test ... -c dbg --build_tests_only --build_event_json_file=bep.jsonl

      - name: Collect failing test logs
        if: failure()
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools\collect_test_logs.py --bep bep.jsonl --out "%GITHUB_WORKSPACE%\test_logs"

      - name: Upload failing test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ runner.os }}-${{ runner.arch }}
          path: test_logs
          if-no-files-found: ignore

  # actions/cache works without this job, but having this would increase the likelihood of cache hit
  # in other jobs. Another approach would be to use "needs:".
  # https://docs.github.com/en/actions/using-jobs/using-jobs-in-a-workflow
  cache_deps_on_x64:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Try to restore update_deps cache
        uses: actions/cache@v6
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py --cache_only

  # actions/cache works without this job, but having this would increase the likelihood of cache hit
  # in other jobs. Another approach would be to use "needs:".
  # https://docs.github.com/en/actions/using-jobs/using-jobs-in-a-workflow
  cache_deps_on_arm64:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows11-Arm64-Readme.md
    runs-on: windows-11-arm
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Try to restore update_deps cache
        uses: actions/cache@v6
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py --cache_only
